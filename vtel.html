<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Villa Rhode — Mobile (vtel)</title>
  <meta name="description" content="Villa d'architecte d'exception à Rhode-Saint-Genèse. Version mobile-first." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Tailwind CDN (mode JIT, classes générées à la volée) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300&family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Configuration Tailwind : palette CHAUDE (sable, terre, ocre, cuir).
       Plus de blanc cassé — du beige clay avec profondeur. -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper:  '#ede0ca',   // sable chaud / cream
            paper2: '#f5ead3',   // crème plus clair pour blocs
            canvas: '#e1d2b6',   // beige doré (sections accent)
            sand:   '#d6c19a',   // sable plus profond
            clay:   '#b89572',   // terre cuite (accent)
            beige:  '#cab797',   // beige minéral
            stone:  '#7a6f5e',   // gris-brun chaud
            stone2: '#4a4338',   // gris-brun profond
            ink:    '#1f1a13',   // noir café
            moss:   '#6b6e3e',   // vert olive (accent)
            ember:  '#a8593a',   // braise (rare accent)
            'spektr-cyan-50': '#6b6e3e',
          },
          fontFamily: {
            display: ['"Inter Tight"', 'Inter', 'system-ui', 'sans-serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
            italic: ['Fraunces', 'Georgia', 'serif'],
          },
          backgroundImage: {
            'warm-grad': 'radial-gradient(ellipse at top, #f5ead3 0%, #ede0ca 35%, #e1d2b6 100%)',
            'sun-grad':  'radial-gradient(circle at 80% 20%, #f5ead3 0%, #ede0ca 40%, #d6c19a 100%)',
            'ember-grad':'linear-gradient(135deg, #1f1a13 0%, #2d251a 50%, #1f1a13 100%)',
          },
          animation: {
            'breathe': 'breathe 9s ease-in-out infinite',
            'float-slow': 'float 14s ease-in-out infinite',
          },
          keyframes: {
            breathe: {
              '0%,100%': { transform: 'scale(1) translate(0,0)', opacity: '0.6' },
              '50%':     { transform: 'scale(1.15) translate(2%,-3%)', opacity: '0.85' },
            },
            float: {
              '0%,100%': { transform: 'translate(0, 0)' },
              '50%':     { transform: 'translate(-3%, -4%)' },
            },
          },
        },
      },
    }
  </script>

  <style>
    body {
      background: #ede0ca;
      color: #1f1a13;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: clip;
    }
    em {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      color: #4a4338;
    }
    ::selection { background: #1f1a13; color: #ede0ca; }

    /* Grain texturé subtil — donne de la chaleur tactile aux fonds */
    .grain::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Orbes lumineux flottants (ambient) */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* Boot loader */
    /* Boot loader = hero statique. Visible IMMÉDIATEMENT (pas besoin
       d'attendre React/Babel/Framer-motion). Quand React monte, on cache
       en fade-out — l'utilisateur voit déjà le hero sans interruption. */
    .boot {
      position: fixed; inset: 0;
      z-index: 100;
      overflow: hidden;
      background: #ede0ca;
      transition: opacity 700ms ease;
      /* Le scroll passe au travers — l'utilisateur peut atteindre le contenu
         même si le boot reste affiché plus longtemps que prévu. */
      pointer-events: none;
    }
    .boot__video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .boot__veil {
      position: absolute; inset: 0;
      background: linear-gradient(180deg,
        rgba(237,224,202,0.30) 0%,
        rgba(237,224,202,0.05) 35%,
        rgba(237,224,202,0.85) 100%);
    }
    .boot__title {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: clamp(2.6rem, 14vw, 5rem);
      font-weight: 600;
      letter-spacing: -0.035em;
      color: #14130f;
      text-align: center;
      white-space: nowrap;
    }
    .boot__hint {
      position: absolute;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter Tight', system-ui, sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.62rem;
      color: rgba(20,19,15,0.45);
    }
    .boot.hidden { opacity: 0; pointer-events: none; }
  </style>

  <!-- Préload du média critique du hero pour démarrer le download tôt -->
  <link rel="preload" as="image" href="assets/images/8906584_1_20260408150341.jpg" />
  <link rel="preload" as="video" href="assets/videos/1.mp4" type="video/mp4" />

  <!-- Babel standalone pour interpréter le JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

  <!-- 1) Charger les libs React + Framer Motion + Lucide via ESM.
          Stratégie résistante : retries + fallback CDN.
          Primaire : esm.sh (gère bien les deps de framer-motion)
          Fallback : jsdelivr (+esm) si esm.sh tombe -->
  <script type="module">
    /* Charge un module avec 2 retries puis bascule sur fallback */
    async function loadWithRetry(primary, fallback, attempts = 2) {
      const urls = [primary, primary, fallback];   // 2 essais primaire + 1 fallback
      let lastErr;
      for (const url of urls) {
        if (!url) continue;
        try {
          return await import(url);
        } catch (err) {
          lastErr = err;
          console.warn('[v2 retry]', url, err.message);
          await new Promise(r => setTimeout(r, 250));
        }
      }
      throw lastErr || new Error('Tous les CDN ont échoué');
    }

    try {
      const [ReactModule, ReactDOMModule, MotionModule, LucideModule] = await Promise.all([
        loadWithRetry(
          'https://esm.sh/react@18.3.1',
          'https://cdn.jsdelivr.net/npm/react@18.3.1/+esm',
        ),
        loadWithRetry(
          'https://esm.sh/react-dom@18.3.1/client',
          'https://cdn.jsdelivr.net/npm/react-dom@18.3.1/client/+esm',
        ),
        loadWithRetry(
          'https://esm.sh/framer-motion@11.11.17?deps=react@18.3.1,react-dom@18.3.1',
          'https://cdn.jsdelivr.net/npm/framer-motion@11.11.17/+esm',
        ),
        loadWithRetry(
          'https://esm.sh/lucide-react@0.469.0?deps=react@18.3.1',
          'https://cdn.jsdelivr.net/npm/lucide-react@0.469.0/+esm',
        ),
      ]);

      window.React = ReactModule.default || ReactModule;
      window.ReactDOM = ReactDOMModule;
      window.Motion = MotionModule;
      window.Lucide = LucideModule;
      window.dispatchEvent(new Event('libs-ready'));
      console.log('[v2] Libs chargées avec succès');
    } catch (err) {
      console.error('[v2 libs error]', err);
      const boot = document.getElementById('boot');
      if (boot) boot.innerHTML =
        '<div style="text-align:center;max-width:80vw">' +
        '<div style="color:#cc4444;letter-spacing:0.04em;text-transform:none;font-size:0.85rem;line-height:1.4;margin-bottom:1rem">' +
        '⚠ Échec du chargement : ' + (err.message || err) + '</div>' +
        '<button onclick="location.reload()" style="padding:0.5rem 1rem;border:1px solid #888;border-radius:999px;background:transparent;color:#888;font-size:0.7rem;letter-spacing:0.1em;cursor:pointer">RECHARGER</button>' +
        '</div>';
    }
  </script>
</head>

<body>
  <!-- Boot loader avec hero statique : visible immédiatement.
       Filet de sécurité : auto-cache après 4s même si React tarde. -->
  <div class="boot" id="boot">
    <video
      class="boot__video"
      src="assets/videos/1.mp4"
      poster="assets/images/8906584_1_20260408150341.jpg"
      autoplay muted loop playsinline preload="auto"
    ></video>
    <div class="boot__veil"></div>
    <h1 class="boot__title">Villa Rhode</h1>
    <span class="boot__hint">Christie's</span>
  </div>
  <script>
    // Si React tarde à monter, on cache le boot quand même au bout de 4s
    // pour que l'utilisateur voie les photos / le reste du contenu.
    setTimeout(function() {
      var b = document.getElementById('boot');
      if (b && !b.classList.contains('hidden')) b.classList.add('hidden');
    }, 4000);
  </script>
  <div id="root"></div>

  <!-- Affiche toute erreur dans le boot loader, pour debugger sans console -->
  <script>
    window.addEventListener('error', (e) => {
      const boot = document.getElementById('boot');
      if (boot) boot.innerHTML =
        '<span style="color:#cc4444;letter-spacing:0.04em;text-transform:none;font-size:0.85rem;max-width:80vw;text-align:center">⚠ ' +
        (e.message || e.error?.message || 'Erreur de chargement') +
        '</span>';
      console.error('[v2.html error]', e);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const boot = document.getElementById('boot');
      if (boot) boot.innerHTML =
        '<span style="color:#cc4444;letter-spacing:0.04em;text-transform:none;font-size:0.85rem;max-width:80vw;text-align:center">⚠ ' +
        (e.reason?.message || e.reason || 'Promesse rejetée') +
        '</span>';
      console.error('[v2.html rejection]', e.reason);
    });
  </script>

  <!-- 2) L'app React entière, en JSX (Babel standalone, sans data-type=module).
       On attend que les libs soient prêtes, puis on bootstrap depuis window. -->
  <script type="text/babel" data-presets="react">
    /* Wrapper d'attente : on n'exécute le code que quand les libs sont sur window */
    function bootstrap() {
      const { useState, useEffect, useMemo, useRef } = window.React;
      const { createRoot } = window.ReactDOM;
      const {
        motion,
        AnimatePresence,
        useScroll,
        useTransform,
        useInView,
      } = window.Motion;
      const {
        MoveRight, Calendar, MapPin, ArrowDown, ArrowRight, ArrowUpRight,
        Phone, Mail, Flame, Car, Dumbbell, Film, Wind, Droplet,
        Trees, BookOpen, Sparkles, Maximize2, ChevronRight,
        Play, X,
        // icônes pour la sidebar
        Home, Quote, LayoutGrid, Wrench, Ruler, Video, Images,
      } = window.Lucide;
      const React = window.React;

    /* ────────────────────────────────────────────────────────────
       BUTTON (mini-shadcn)
       Les composants du component-library s'attendent à un Button
       shadcn. On en fournit une version compacte.
    ──────────────────────────────────────────────────────────── */
    function Button({ children, variant = 'default', size = 'md', className = '', ...props }) {
      const base =
        'inline-flex items-center justify-center gap-2 rounded-full font-medium ' +
        'transition-all duration-300 select-none whitespace-nowrap';
      const variants = {
        default: 'bg-ink text-paper hover:bg-stone2',
        secondary: 'bg-canvas text-ink hover:bg-beige',
        outline: 'border border-ink/30 text-ink hover:bg-ink hover:text-paper',
        ghost: 'text-ink hover:bg-canvas',
      };
      const sizes = {
        sm: 'text-xs px-3 py-1.5',
        md: 'text-sm px-5 py-2.5',
        lg: 'text-sm px-6 py-3.5',
      };
      return (
        <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {children}
        </button>
      );
    }

    /* ════════════════════════════════════════════════════════════
       SCROLL UTILITIES — progress bar, marquee, counter, indicator
    ════════════════════════════════════════════════════════════ */

    /* Barre de progression de scroll en haut, scrub via useScroll */
    function ScrollProgress() {
      const { scrollYProgress } = useScroll();
      const scaleX = useTransform(scrollYProgress, [0, 1], [0, 1]);
      return (
        <motion.div
          style={{ scaleX }}
          className="fixed top-0 left-0 right-0 h-[2px] bg-ink z-[60] origin-left"
        />
      );
    }

    /* Marquee : strip de texte qui défile en boucle, vitesse modulée par
       la vélocité de scroll. Inspiré de luxe/aerospatiale. */
    function Marquee({ items, dark = false, baseSpeed = 25 }) {
      const ref = useRef(null);
      const { scrollYProgress } = useScroll({
        target: ref,
        offset: ['start end', 'end start'],
      });
      // Chaque marquee se translate de 0 à -50% (1 cycle complet) au scroll
      const x = useTransform(scrollYProgress, [0, 1], ['0%', '-50%']);

      const cls = dark
        ? 'bg-ink text-paper border-y border-paper/20'
        : 'bg-paper2 text-ink border-y border-ink/15';

      return (
        <div ref={ref} className={`relative w-full overflow-hidden py-5 md:py-7 ${cls} grain`}>
          <motion.div
            style={{ x }}
            className="flex whitespace-nowrap gap-12 md:gap-16 will-change-transform"
          >
            {/* On duplique le tableau 2× pour avoir une boucle infinie au défilement */}
            {[...items, ...items].map((it, i) => (
              <span
                key={i}
                className="inline-flex items-center gap-12 md:gap-16 font-display text-2xl md:text-5xl font-semibold tracking-tighter"
              >
                <span>{it}</span>
                <span className="text-clay opacity-60">✦</span>
              </span>
            ))}
          </motion.div>
        </div>
      );
    }

    /* Compteur classique : utilise IntersectionObserver natif (plus fiable
       que useInView de framer-motion sur Safari mobile). Si l'IO ne fait
       jamais firer (ex. élément déjà visible au mount), on lance l'animation
       directement après un court délai. */
    function Counter({ to, suffix = '', format = 'plain' }) {
      const ref = useRef(null);
      const fmt = (n) =>
        format === 'thousands' && n >= 1000
          ? n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ')
          : String(n);
      const [display, setDisplay] = useState('0');

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        let started = false;
        let raf;

        const start = () => {
          if (started) return;
          started = true;
          const t0 = performance.now();
          const duration = 1400;
          const tick = (now) => {
            const t = Math.min(1, (now - t0) / duration);
            const eased = 1 - Math.pow(1 - t, 3);  // ease-out cubic
            setDisplay(fmt(Math.round(to * eased)));
            if (t < 1) raf = requestAnimationFrame(tick);
          };
          raf = requestAnimationFrame(tick);
        };

        // Si l'élément est déjà dans le viewport au mount, lance directement
        const r = el.getBoundingClientRect();
        if (r.top < window.innerHeight && r.bottom > 0) {
          start();
        } else if ('IntersectionObserver' in window) {
          const io = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  start();
                  io.disconnect();
                }
              });
            },
            { threshold: 0.1 }
          );
          io.observe(el);
          return () => { io.disconnect(); if (raf) cancelAnimationFrame(raf); };
        } else {
          // fallback : pas d'IO → on lance après 200ms
          const t = setTimeout(start, 200);
          return () => { clearTimeout(t); if (raf) cancelAnimationFrame(raf); };
        }

        return () => { if (raf) cancelAnimationFrame(raf); };
      }, [to, format]);

      return (
        <span ref={ref} className="tabular-nums">
          {display}{suffix && <i className="not-italic text-paper/45 text-sm font-medium ml-1 align-baseline">{suffix}</i>}
        </span>
      );
    }

    /* ════════════════════════════════════════════════════════════
       IMAGE COMPARISON (component-library / bundui · 21st.dev)
       Slider drag-to-reveal entre 2 images. Adapté pour notre stack
       (window.Motion au lieu de import motion/react).
    ════════════════════════════════════════════════════════════ */
    const { useMotionValue, useSpring } = window.Motion;
    const ImageComparisonContext = React.createContext(undefined);

    function ImageComparison({ children, className = '', enableHover = false, springOptions }) {
      const [isDragging, setIsDragging] = useState(false);
      const motionValue = useMotionValue(50);
      const motionSliderPosition = useSpring(
        motionValue,
        springOptions ?? { bounce: 0, duration: 0 }
      );

      const handleDrag = (event) => {
        if (!isDragging && !enableHover) return;
        const rect = event.currentTarget.getBoundingClientRect();
        const x = 'touches' in event
          ? event.touches[0].clientX - rect.left
          : event.clientX - rect.left;
        const pct = Math.min(Math.max((x / rect.width) * 100, 0), 100);
        motionValue.set(pct);
      };

      return (
        <ImageComparisonContext.Provider value={{ motionSliderPosition }}>
          <div
            className={`relative overflow-hidden select-none ${enableHover ? 'cursor-ew-resize' : 'cursor-grab active:cursor-grabbing'} ${className}`}
            onMouseMove={handleDrag}
            onMouseDown={() => !enableHover && setIsDragging(true)}
            onMouseUp={() => !enableHover && setIsDragging(false)}
            onMouseLeave={() => !enableHover && setIsDragging(false)}
            onTouchMove={handleDrag}
            onTouchStart={() => !enableHover && setIsDragging(true)}
            onTouchEnd={() => !enableHover && setIsDragging(false)}
          >
            {children}
          </div>
        </ImageComparisonContext.Provider>
      );
    }

    function ImageComparisonImage({ src, alt, position, className = '' }) {
      const { motionSliderPosition } = React.useContext(ImageComparisonContext);
      const leftClipPath  = useTransform(motionSliderPosition, (v) => `inset(0 0 0 ${v}%)`);
      const rightClipPath = useTransform(motionSliderPosition, (v) => `inset(0 ${100 - v}% 0 0)`);
      return (
        <motion.img
          src={src}
          alt={alt}
          draggable={false}
          className={`absolute inset-0 h-full w-full object-cover ${className}`}
          style={{ clipPath: position === 'left' ? leftClipPath : rightClipPath }}
        />
      );
    }

    function ImageComparisonSlider({ className = '', children }) {
      const { motionSliderPosition } = React.useContext(ImageComparisonContext);
      const left = useTransform(motionSliderPosition, (v) => `${v}%`);
      return (
        <motion.div
          className={`absolute top-0 bottom-0 w-[2px] cursor-ew-resize ${className}`}
          style={{ left, x: '-50%' }}
        >
          {children}
        </motion.div>
      );
    }

    /* ────────────────────────────────────────────────────────────
       JOUR / NUIT — section image-comparison drag-to-reveal
    ──────────────────────────────────────────────────────────── */
    function JourNuit() {
      const ref = useRef(null);
      const inView = useInView(ref, { once: true, margin: '-15% 0%' });

      return (
        <section ref={ref} id="jour-nuit" className="relative bg-paper2 grain py-20 md:py-28 px-5 overflow-hidden">
          <div className="container mx-auto max-w-7xl">
            <motion.header
              initial={{ opacity: 0, y: 24 }}
              animate={inView ? { opacity: 1, y: 0 } : {}}
              transition={{ duration: 0.8 }}
              className="mb-10 md:mb-14 flex justify-between items-end flex-wrap gap-4"
            >
              <div>
                <span className="block text-[0.65rem] uppercase tracking-[0.22em] text-stone font-medium mb-5">
                  — Jour & nuit
                </span>
                <h2 className="font-display text-3xl md:text-5xl font-semibold tracking-tighter leading-[0.96] max-w-2xl">
                  Deux visages
                  <em> de la même villa.</em>
                </h2>
              </div>
              <span className="text-xs text-stone tabular-nums px-3 py-1.5 border border-ink/15 rounded-full">
                glissez ↔
              </span>
            </motion.header>

            <motion.div
              initial={{ opacity: 0, y: 32, scale: 0.97 }}
              animate={inView ? { opacity: 1, y: 0, scale: 1 } : {}}
              transition={{ duration: 1, ease: [0.16, 1, 0.3, 1] }}
              className="rounded-md overflow-hidden bg-canvas shadow-2xl"
            >
              <ImageComparison
                enableHover
                springOptions={{ bounce: 0.1, duration: 400 }}
                className="aspect-[4/3] md:aspect-[16/10] w-full"
              >
                <ImageComparisonImage
                  position="left"
                  src="assets/images/villa-jour.jpg"
                  alt="Villa Rhode de jour"
                />
                <ImageComparisonImage
                  position="right"
                  src="assets/images/villa-nuit.png"
                  alt="Villa Rhode de nuit"
                />
                <ImageComparisonSlider className="bg-paper shadow-[0_0_20px_rgba(0,0,0,0.3)]">
                  {/* Poignée centrale ronde */}
                  <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 h-12 w-12 rounded-full bg-paper border-2 border-ink/30 shadow-lg flex items-center justify-center">
                    <ChevronRight className="h-3 w-3 text-ink rotate-180 -mr-0.5" strokeWidth={2.5} />
                    <ChevronRight className="h-3 w-3 text-ink -ml-0.5" strokeWidth={2.5} />
                  </div>
                </ImageComparisonSlider>

                {/* Étiquettes JOUR / NUIT */}
                <div className="absolute top-4 left-4 z-10 px-3 py-1.5 rounded-full bg-ink/55 backdrop-blur text-paper text-[0.65rem] font-display tracking-[0.2em] uppercase font-medium">
                  Jour
                </div>
                <div className="absolute top-4 right-4 z-10 px-3 py-1.5 rounded-full bg-ink/55 backdrop-blur text-paper text-[0.65rem] font-display tracking-[0.2em] uppercase font-medium">
                  Nuit
                </div>
              </ImageComparison>
            </motion.div>

            <motion.p
              initial={{ opacity: 0, y: 16 }}
              animate={inView ? { opacity: 1, y: 0 } : {}}
              transition={{ duration: 0.7, delay: 0.4 }}
              className="mt-6 text-stone2 text-sm md:text-base text-center max-w-xl mx-auto"
            >
              La même façade, deux atmosphères : la lumière du nord en journée,
              l'éclairage architectural à la tombée du jour.
            </motion.p>
          </div>
        </section>
      );
    }

    /* ════════════════════════════════════════════════════════════
       LIQUID GLASS (component-library / suraj-xd · 21st.dev)
       Frosted-glass UI : <GlassEffect>, <GlassButton>, <GlassFilter>.
       <GlassFilter> doit être rendu UNE FOIS dans l'app (dans App()).
    ════════════════════════════════════════════════════════════ */
    function GlassFilter() {
      return (
        <svg style={{ display: 'none', position: 'absolute' }} aria-hidden>
          {/* Sharpen pour vidéos — kernel de convolution 3×3
              Le centre est élevé (9), entouré de -1 ; le tout
              accentue les hautes fréquences (détails fins). */}
          <filter id="video-sharpen" x="0" y="0" width="100%" height="100%">
            <feConvolveMatrix
              order="3"
              preserveAlpha="true"
              kernelMatrix="0 -1 0  -1 5.2 -1  0 -1 0"
            />
          </filter>
          <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
            <feTurbulence type="fractalNoise" baseFrequency="0.001 0.005" numOctaves="1" seed="17" result="turbulence" />
            <feComponentTransfer in="turbulence" result="mapped">
              <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5" />
              <feFuncG type="gamma" amplitude="0" exponent="1" offset="0" />
              <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5" />
            </feComponentTransfer>
            <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap" />
            <feSpecularLighting in="softMap" surfaceScale="5" specularConstant="1" specularExponent="100" lightingColor="white" result="specLight">
              <fePointLight x="-200" y="-200" z="300" />
            </feSpecularLighting>
            <feComposite in="specLight" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litImage" />
            <feDisplacementMap in="SourceGraphic" in2="softMap" scale="200" xChannelSelector="R" yChannelSelector="G" />
          </filter>
        </svg>
      );
    }

    function GlassEffect({ children, className = '', style = {}, href, target = '_blank', onClick }) {
      const glassStyle = {
        boxShadow: '0 6px 6px rgba(0, 0, 0, 0.2), 0 0 20px rgba(0, 0, 0, 0.1)',
        transitionTimingFunction: 'cubic-bezier(0.175, 0.885, 0.32, 2.2)',
        ...style,
      };
      const content = (
        <div
          onClick={onClick}
          className={`relative flex font-semibold overflow-hidden text-white cursor-pointer transition-all duration-700 ${className}`}
          style={glassStyle}
        >
          <div
            className="absolute inset-0 z-0 overflow-hidden rounded-[inherit]"
            style={{ backdropFilter: 'blur(3px)', WebkitBackdropFilter: 'blur(3px)', filter: 'url(#glass-distortion)', isolation: 'isolate' }}
          />
          <div
            className="absolute inset-0 z-10 rounded-[inherit]"
            style={{ background: 'rgba(255, 255, 255, 0.18)' }}
          />
          <div
            className="absolute inset-0 z-20 rounded-[inherit] overflow-hidden"
            style={{ boxShadow: 'inset 2px 2px 1px 0 rgba(255, 255, 255, 0.5), inset -1px -1px 1px 1px rgba(255, 255, 255, 0.5)' }}
          />
          <div className="relative z-30">{children}</div>
        </div>
      );
      return href
        ? <a href={href} target={target} rel="noopener noreferrer" className="block">{content}</a>
        : content;
    }

    function GlassButton({ children, href, onClick, className = '' }) {
      return (
        <GlassEffect
          href={href}
          onClick={onClick}
          className={`rounded-3xl px-7 py-4 hover:px-8 hover:py-5 ${className}`}
        >
          <div
            className="transition-all duration-700 hover:scale-95 flex items-center gap-2 text-sm md:text-base"
            style={{ transitionTimingFunction: 'cubic-bezier(0.175, 0.885, 0.32, 2.2)' }}
          >
            {children}
          </div>
        </GlassEffect>
      );
    }

    /* ────────────────────────────────────────────────────────────
       CONTAINER SCROLL ANIMATION (Aceternity)
       Adapté du component-library : on garde la mécanique
       (rotation 3D + scale) et on injecte un titre + une vidéo.
    ──────────────────────────────────────────────────────────── */
    /* ════════════════════════════════════════════════════════════
       SCROLL EXPAND MEDIA (component-library / arunachalam0606)
       Adapté : la version canonique hijack le wheel ; ici on utilise
       useScroll + sticky pin pour intégrer la section dans le flow
       de scroll normal du site (pas de scroll trap). Le média grandit
       de 300×400 à full-bleed pendant que l'utilisateur scrolle dans
       la section, le titre "Villa / Rhode" s'écarte horizontalement,
       et le contenu enfant apparaît après expansion.
    ════════════════════════════════════════════════════════════ */
    function ScrollExpandMedia({
      id,
      mediaSrc,
      posterSrc,
      bgImageSrc,
      title = 'Villa Rhode',
      date,
      scrollToExpand = 'Faites défiler',
      children,
    }) {
      const sectionRef = useRef(null);
      const [isMobile, setIsMobile] = useState(false);
      useEffect(() => {
        const check = () => setIsMobile(window.innerWidth < 768);
        check();
        window.addEventListener('resize', check);
        return () => window.removeEventListener('resize', check);
      }, []);

      // useScroll mappé sur la section : 0 au start, 1 au end
      const { scrollYProgress } = useScroll({
        target: sectionRef,
        offset: ['start start', 'end end'],
      });

      // L'expansion se fait sur les 60 % du scroll de section
      const mediaWidth  = useTransform(scrollYProgress, [0, 0.6], [300,  isMobile ? 950  : 1550]);
      const mediaHeight = useTransform(scrollYProgress, [0, 0.6], [400,  isMobile ? 600  : 800]);
      const bgOpacity   = useTransform(scrollYProgress, [0, 0.6], [1,    0]);
      const overlayOp   = useTransform(scrollYProgress, [0, 0.6], [0.5,  0.2]);
      const txX         = useTransform(scrollYProgress, [0, 0.6], [0,    isMobile ? 35 : 28]); // en vw
      const dateX       = useTransform(scrollYProgress, [0, 0.6], [0,    -15]);
      const expandX     = useTransform(scrollYProgress, [0, 0.6], [0,    15]);
      const contentOp   = useTransform(scrollYProgress, [0.7, 1], [0,    1]);
      const contentY    = useTransform(scrollYProgress, [0.7, 1], [40,   0]);

      const [firstWord, ...rest] = (title || '').split(' ');
      const restOfTitle = rest.join(' ');

      return (
        <section
          ref={sectionRef}
          id={id}
          className="relative bg-ink"
          style={{ height: '300vh' }}
        >
          {/* Sticky : reste pinned tant que la section traverse l'écran */}
          <div className="sticky top-0 h-screen w-full overflow-hidden flex items-center justify-center">

            {/* Couche 1 : image de fond (photo) qui s'efface */}
            <motion.div
              style={{ opacity: bgOpacity }}
              className="absolute inset-0 z-0"
            >
              <img
                src={bgImageSrc}
                alt=""
                className="absolute inset-0 h-full w-full object-cover"
              />
              <div className="absolute inset-0 bg-ink/15" />
            </motion.div>

            {/* Couche 2 : la vidéo qui grandit, centrée */}
            <motion.div
              style={{
                width: mediaWidth,
                height: mediaHeight,
                maxWidth: '95vw',
                maxHeight: '85vh',
                boxShadow: '0px 0px 50px rgba(0, 0, 0, 0.45)',
              }}
              className="relative z-10 rounded-2xl overflow-hidden"
            >
              <video
                src={mediaSrc}
                poster={posterSrc}
                autoPlay
                muted
                loop
                playsInline
                preload="none"
                className="w-full h-full object-cover"
              />
              <motion.div
                style={{ opacity: overlayOp }}
                className="absolute inset-0 bg-ink/40"
              />

              {/* Date + scrollToExpand sous la vidéo, qui s'écartent */}
              <div className="absolute -bottom-12 md:-bottom-16 left-0 right-0 flex flex-col items-center text-center pointer-events-none">
                {date && (
                  <motion.p
                    style={{ x: dateX, transform: 'translateX(0vw)' }}
                    className="font-display text-sm md:text-base text-paper/80 tracking-[0.18em] uppercase font-medium tabular-nums"
                  >
                    {date}
                  </motion.p>
                )}
                {scrollToExpand && (
                  <motion.p
                    style={{ x: expandX }}
                    className="font-display text-xs md:text-sm text-paper/55 mt-1 tracking-[0.18em] uppercase font-medium"
                  >
                    {scrollToExpand} ↓
                  </motion.p>
                )}
              </div>
            </motion.div>

            {/* Couche 3 : titre splitté Villa / Rhode qui s'écarte */}
            <div className="absolute inset-0 z-20 flex flex-col items-center justify-center gap-3 md:gap-6 pointer-events-none mix-blend-difference">
              <motion.h2
                style={{ x: useTransform(txX, (v) => `-${v}vw`) }}
                className="font-display text-5xl md:text-7xl lg:text-[7rem] font-semibold tracking-tighter text-paper leading-none"
              >
                {firstWord}
              </motion.h2>
              <motion.h2
                style={{ x: useTransform(txX, (v) => `${v}vw`) }}
                className="font-display text-5xl md:text-7xl lg:text-[7rem] font-semibold tracking-tighter text-paper italic leading-none"
              >
                {restOfTitle}
              </motion.h2>
            </div>

            {/* Couche 4 : contenu enfant, apparaît après expansion */}
            {children && (
              <motion.div
                style={{ opacity: contentOp, y: contentY }}
                className="absolute bottom-10 md:bottom-16 left-0 right-0 px-6 md:px-12 z-30 max-w-3xl mx-auto text-center text-paper"
              >
                {children}
              </motion.div>
            )}
          </div>
        </section>
      );
    }

    function ContainerScroll({ titleComponent, children, id }) {
      const ref = useRef(null);
      const { scrollYProgress } = useScroll({ target: ref });
      const [isMobile, setIsMobile] = useState(false);
      useEffect(() => {
        const check = () => setIsMobile(window.innerWidth <= 768);
        check();
        window.addEventListener('resize', check);
        return () => window.removeEventListener('resize', check);
      }, []);

      const rotate = useTransform(scrollYProgress, [0, 1], [20, 0]);
      const scale = useTransform(scrollYProgress, [0, 1], isMobile ? [0.7, 0.9] : [1.05, 1]);
      const translate = useTransform(scrollYProgress, [0, 1], [0, -100]);

      return (
        <div
          ref={ref}
          id={id}
          className="relative flex h-[60rem] items-center justify-center p-2 md:h-[80rem] md:p-20"
        >
          <div className="relative w-full py-10 md:py-40" style={{ perspective: '1000px' }}>
            <motion.div style={{ translateY: translate }} className="mx-auto max-w-5xl text-center">
              {titleComponent}
            </motion.div>

            <motion.div
              style={{
                rotateX: rotate,
                scale,
                boxShadow:
                  '0 0 #0000004d, 0 9px 20px #0000004a, 0 37px 37px #00000042, 0 84px 50px #00000026, 0 149px 60px #0000000a, 0 233px 65px #00000003',
              }}
              className="mx-auto -mt-12 h-[30rem] w-full max-w-5xl rounded-[30px] border-4 border-[#6c6c6c] bg-[#222222] p-2 shadow-2xl md:h-[40rem] md:p-6"
            >
              <div className="h-full w-full overflow-hidden rounded-2xl bg-zinc-900 md:rounded-2xl md:p-0">
                {children}
              </div>
            </motion.div>
          </div>
        </div>
      );
    }

    /* ────────────────────────────────────────────────────────────
       STATEMENT — section éditoriale, fade-in stagger
    ──────────────────────────────────────────────────────────── */
    /* Helper : un mot qui s'éclaire au passage du scroll. La progression
       est calculée individuellement pour chaque mot. */
    function ScrollWord({ children, progress, range }) {
      const opacity = useTransform(progress, range, [0.18, 1]);
      return <motion.span style={{ opacity }}>{children} </motion.span>;
    }

    function Statement() {
      const ref = useRef(null);
      const inView = useInView(ref, { once: true, margin: '-15% 0%' });

      // Pour le reveal mot-à-mot scroll-driven
      const { scrollYProgress } = useScroll({
        target: ref,
        offset: ['start 80%', 'end 50%'],
      });

      const sentence = "On n'habite pas une villa. On l'interprète.";
      const words = sentence.split(' ');
      const isItalic = (i) => i >= 5; // les derniers mots sont en italique

      return (
        <section ref={ref} id="manifesto" className="relative bg-canvas grain py-24 md:py-36 px-5 overflow-hidden">
          <span className="orb animate-breathe" style={{
            width: '28rem', height: '28rem',
            top: '20%', left: '-10rem',
            background: 'radial-gradient(circle, rgba(168,89,58,0.18), transparent 70%)',
          }} />
          <div className="container mx-auto max-w-5xl">
            <motion.span
              initial={{ opacity: 0, y: 20 }}
              animate={inView ? { opacity: 1, y: 0 } : {}}
              transition={{ duration: 0.7 }}
              className="block mb-6 text-[0.65rem] uppercase tracking-[0.22em] text-stone font-medium"
            >
              — Manifesto
            </motion.span>
            <h2 className="font-display text-4xl md:text-7xl font-semibold tracking-tighter leading-[1.05]">
              {words.map((w, i) => {
                // chaque mot s'éclaire à son tour : range graduel
                const start = i / words.length;
                const end = (i + 2) / words.length;
                const node = (
                  <ScrollWord key={i} progress={scrollYProgress} range={[start, end]}>
                    {isItalic(i) ? <em>{w}</em> : w}
                  </ScrollWord>
                );
                return node;
              })}
            </h2>
          </div>
        </section>
      );
    }

    /* ────────────────────────────────────────────────────────────
       VIDEO GRID — vidéos qui jouent inline directement.
       IntersectionObserver : seule la vidéo visible joue, les autres
       se mettent en pause pour économiser le décodeur (mobile-friendly).
    ──────────────────────────────────────────────────────────── */
    /* Carte vidéo contenue, alternant gauche/droite, avec animations
       scroll-controlled : scale, parallax y, opacité du texte. */
    function VideoCard({ src, title, desc, index, total, reverse }) {
      const ref = useRef(null);
      const videoRef = useRef(null);
      const inView = useInView(ref, { margin: '-15% 0%' });

      // Joue/pause selon visibilité
      useEffect(() => {
        const v = videoRef.current;
        if (!v) return;
        if (inView) {
          const p = v.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        } else {
          v.pause();
        }
      }, [inView]);

      // Animations scroll-driven (mappées sur la traversée de la carte)
      const { scrollYProgress } = useScroll({
        target: ref,
        offset: ['start end', 'end start'],
      });
      // Vidéo : scale qui culmine au centre, parallax y léger
      const vidScale = useTransform(scrollYProgress, [0, 0.5, 1], [0.92, 1, 0.96]);
      const vidY     = useTransform(scrollYProgress, [0, 1], ['8%', '-8%']);
      // Texte : entrée puis stable puis sortie douce
      const textOp = useTransform(scrollYProgress, [0.05, 0.3, 0.7, 0.95], [0, 1, 1, 0.4]);
      const textY  = useTransform(scrollYProgress, [0.05, 0.3, 0.7, 0.95], [40, 0, 0, -20]);
      // Compteur : sa ligne grandit au centre
      const lineScale = useTransform(scrollYProgress, [0.1, 0.5, 0.9], [0.3, 1, 0.6]);

      return (
        <div
          ref={ref}
          className={`grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-12 items-center py-10 md:py-16 ${
            reverse ? 'md:[direction:rtl]' : ''
          }`}
        >
          {/* Colonne vidéo : 7/12 */}
          <motion.figure
            style={{ scale: vidScale, y: vidY }}
            className="relative md:col-span-7 [direction:ltr] aspect-video overflow-hidden rounded-md bg-canvas shadow-xl"
          >
            <video
              ref={videoRef}
              src={src}
              muted
              loop
              playsInline
              preload="none"
              className="absolute inset-0 h-full w-full object-cover"
            />
            <div className="absolute inset-0 bg-gradient-to-t from-ink/30 via-transparent to-transparent pointer-events-none" />
          </motion.figure>

          {/* Colonne texte : 5/12 */}
          <motion.div
            style={{ opacity: textOp, y: textY }}
            className="md:col-span-5 [direction:ltr] flex flex-col gap-4"
          >
            <div className="flex items-center gap-3">
              <motion.span
                style={{ scaleX: lineScale, transformOrigin: 'left' }}
                className="block h-px w-10 bg-ink"
              />
              <span className="font-display text-[0.62rem] uppercase tracking-[0.22em] text-stone tabular-nums">
                {String(index + 1).padStart(2, '0')} / {String(total).padStart(2, '0')} · Cadrage
              </span>
            </div>
            <h3 className="font-display text-2xl md:text-4xl font-semibold tracking-tighter leading-[1.02]">
              {title}
            </h3>
            <p className="text-stone2 text-sm md:text-base leading-relaxed max-w-md">
              {desc}
            </p>
          </motion.div>
        </div>
      );
    }

    /* ────────────────────────────────────────────────────────────
       FLOATING GLASS CTA — apparaît après le hero, fixé en bas
    ──────────────────────────────────────────────────────────── */
    function FloatingCTA() {
      const [show, setShow] = useState(false);
      useEffect(() => {
        const onS = () => setShow(window.scrollY > window.innerHeight * 0.6);
        onS();
        window.addEventListener('scroll', onS, { passive: true });
        return () => window.removeEventListener('scroll', onS);
      }, []);
      return (
        <AnimatePresence>
          {show && (
            <motion.div
              initial={{ opacity: 0, y: 32, scale: 0.9 }}
              animate={{ opacity: 1, y: 0, scale: 1 }}
              exit={{ opacity: 0, y: 24, scale: 0.95 }}
              transition={{ duration: 0.5, ease: [0.16, 1, 0.3, 1] }}
              className="fixed bottom-5 left-1/2 -translate-x-1/2 z-40"
            >
              <GlassButton href="#contact" className="text-ink whitespace-nowrap">
                <Calendar className="h-4 w-4" />
                <span>Organiser une visite privée</span>
                <ArrowUpRight className="h-4 w-4" />
              </GlassButton>
            </motion.div>
          )}
        </AnimatePresence>
      );
    }

    /* ────────────────────────────────────────────────────────────
       NAV — barre simple sticky
    ──────────────────────────────────────────────────────────── */
    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      const [hoveredIdx, setHoveredIdx] = useState(null);
      const [activeIdx, setActiveIdx] = useState(-1);

      const links = useMemo(() => ([
        { href: '#espaces',      label: 'Espaces',      id: 'espaces'      },
        { href: '#equipements',  label: 'Équipements',  id: 'equipements'  },
        { href: '#mesures',      label: 'Mesures',      id: 'mesures'      },
        { href: '#galerie',      label: 'Galerie',      id: 'galerie'      },
        { href: '#localisation', label: 'Localisation', id: 'localisation' },
      ]), []);

      useEffect(() => {
        const onS = () => {
          setScrolled(window.scrollY > 80);
          // détecte la section active
          const mid = window.innerHeight * 0.4;
          let active = -1;
          links.forEach((l, i) => {
            const el = document.getElementById(l.id);
            if (!el) return;
            const r = el.getBoundingClientRect();
            if (r.top <= mid) active = i;
          });
          setActiveIdx(active);
        };
        onS();
        window.addEventListener('scroll', onS, { passive: true });
        return () => window.removeEventListener('scroll', onS);
      }, [links]);

      // La pill glass suit le hover ; sinon, marque la section active
      const pillIdx = hoveredIdx !== null ? hoveredIdx : activeIdx;

      return (
        <header
          className={`fixed inset-x-0 top-0 z-50 flex items-center justify-between px-5 md:px-8
            transition-all duration-300 ${
              scrolled
                ? 'py-3 bg-paper/85 backdrop-blur border-b border-ink/10 text-ink'
                : 'py-5 text-ink'
            }`}
        >
          <a href="#top" className="font-display font-semibold tracking-tight text-base">
            Christie's
          </a>

          {/* Menu horizontal — pill liquid glass qui suit le hover (layoutId) */}
          <nav
            className="hidden relative items-center gap-0 text-xs"
            onMouseLeave={() => setHoveredIdx(null)}
          >
            {links.map((l, i) => (
              <a
                key={l.id}
                href={l.href}
                onMouseEnter={() => setHoveredIdx(i)}
                className="relative px-4 py-2 font-display font-medium tracking-tight"
              >
                {/* Pill glass animée — un seul DOM grâce à layoutId Framer Motion */}
                {pillIdx === i && (
                  <motion.span
                    layoutId="nav-pill"
                    className="absolute inset-0 rounded-full overflow-hidden -z-10"
                    transition={{ type: 'spring', stiffness: 380, damping: 32 }}
                    style={{ boxShadow: '0 4px 16px rgba(20, 19, 15, 0.12)' }}
                  >
                    {/* Couche 1 — backdrop blur + distortion fractal liquid */}
                    <span
                      className="absolute inset-0 rounded-[inherit]"
                      style={{
                        backdropFilter: 'blur(8px) saturate(150%)',
                        WebkitBackdropFilter: 'blur(8px) saturate(150%)',
                        filter: 'url(#glass-distortion)',
                        isolation: 'isolate',
                      }}
                    />
                    {/* Couche 2 — voile chaud teinté */}
                    <span
                      className="absolute inset-0 rounded-[inherit]"
                      style={{ background: 'rgba(245, 234, 211, 0.45)' }}
                    />
                    {/* Couche 3 — inset highlights pour l'effet vitré */}
                    <span
                      className="absolute inset-0 rounded-[inherit]"
                      style={{
                        boxShadow:
                          'inset 1.5px 1.5px 1px 0 rgba(255, 255, 255, 0.6), inset -1px -1px 1px 1px rgba(255, 255, 255, 0.35)',
                      }}
                    />
                  </motion.span>
                )}
                <span className={`relative z-10 transition-colors duration-300 ${
                  pillIdx === i ? 'text-ink font-semibold' : 'text-ink/65 hover:text-ink/90'
                }`}>
                  {l.label}
                </span>
              </a>
            ))}
          </nav>

          <a
            href="#contact"
            className="rounded-full border border-current px-3.5 py-1.5 text-xs font-medium tracking-wider hover:bg-current hover:text-paper transition"
          >
            Visite privée
          </a>
        </header>
      );
    }

    /* ────────────────────────────────────────────────────────────
       PAGE TRANSITION — wrapper avec AnimatePresence à l'arrivée
    ──────────────────────────────────────────────────────────── */
    function PageTransition({ children }) {
      return (
        <AnimatePresence mode="wait">
          <motion.div
            key="page"
            initial={{ opacity: 0, y: 12 }}
            animate={{ opacity: 1, y: 0 }}
            exit={{ opacity: 0, y: -12 }}
            transition={{ duration: 0.8, ease: [0.16, 1, 0.3, 1] }}

            {children}

        </AnimatePresence>

    /* ────────────────────────────────────────────────────────────

    function App() {

      return (
        <PageTransition>

          <Nav />

                  La villa, <em>vue d'en haut.</em>

                <video
                  src="assets/videos/villa%20rhodes_Topaz%20Video%20Upscaler_2026-05-06_16-29-01.mp4"
                  autoPlay
                  muted
                  loop
                  playsInline
                  preload="none"
                  className="w-full aspect-video rounded-md object-cover bg-canvas shadow-lg"
                  style={{
                    filter: 'contrast(1.12) saturate(1.12) brightness(1.02)',
                    WebkitFilter: 'contrast(1.12) saturate(1.12) brightness(1.02)',
                  }}
                />
              </div>
            </section>

            {/* 4 · Espaces — 9 univers */}
            <Spaces />

            {/* 5 · Équipements — grille avec icônes */}
            <Amenities />

            {/* 6 · Mesures — fiche technique enrichie */}
            <Specs />

            {/* 7 · Films — mosaïque vidéos additionnelles avec lightbox */}
            <VideoGrid />

            {/* 7b · Jour / Nuit — image-comparison drag-to-reveal */}
            <JourNuit />

            {/* 8 · Galerie — 28 photos avec lightbox */}
            <Gallery />

            {/* 9 · Localisation */}
            <Location />

            {/* 10 · Contact (Sylvie + form fusionnés) */}
            <Contact />
          </main>
          <Footer />
        </PageTransition>
      );
    }

    /* ────────────────────────────────────────────────────────────
       MOUNT
    ──────────────────────────────────────────────────────────── */
    try {
        console.log('[v2] Montage React…');
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
        console.log('[v2] React monté.');
      } catch (err) {
        console.error('[v2 mount error]', err);
        const boot = document.getElementById('boot');
        if (boot) boot.innerHTML =
          '<span style="color:#cc4444;letter-spacing:0.04em;text-transform:none;font-size:0.85rem;max-width:80vw;text-align:center;line-height:1.4">⚠ ' +
          (err.message || String(err)) + '</span>';
      }
    }
    /* Fin de bootstrap() — on l'appelle quand les libs sont prêtes,
       ou immédiatement si c'est déjà fait. */
    if (window.React && window.ReactDOM && window.Motion && window.Lucide) {
      bootstrap();
    } else {
      window.addEventListener('libs-ready', bootstrap, { once: true });
    }
  </script>
